<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Rhythm Studio - Drum Machine</title>

  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>

  <!-- Configuración de Tailwind extendida para soporte de grid -->
  <script>
    tailwind.config = {
      theme: {
        extend: {
          gridTemplateColumns: {
            '16': 'repeat(16, minmax(0, 1fr))',
          }
        }
      }
    }
  </script>

  <!-- Import Map -->
  <script type="importmap">
    {
      "imports": {
        "react": "https://esm.sh/react@18.2.0",
        "react-dom/client": "https://esm.sh/react-dom@18.2.0/client",
        "lucide-react": "https://esm.sh/lucide-react@0.292.0"
      }
    }
  </script>

  <!-- Babel para TSX/JSX en vivo -->
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <style>
    /* Estilos base y pantalla de carga */
    body { background-color: #020617; } /* slate-950 */
    
    #root:empty {
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      background-color: #0f172a;
      color: white;
      font-family: sans-serif;
    }
    #root:empty::after {
      content: "Cargando Rhythm Studio...";
      font-size: 1.5rem;
      animation: pulse 1.5s infinite;
    }
    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.5; }
    }
  </style>
</head>
<body class="bg-slate-950 text-white antialiased">
  <div id="root"></div>

  <script type="module">
    import React from 'react';
    import { createRoot } from 'react-dom/client';

    async function initApp() {
      try {
        // Descargar la nueva app
        const response = await fetch('./rhythm_studio.tsx');
        if (!response.ok) throw new Error("No se pudo cargar el archivo rhythm_studio.tsx");
        const tsxCode = await response.text();

        // Traducir TSX
        const jsCode = Babel.transform(tsxCode, { 
          filename: 'rhythm_studio.tsx',
          presets: ['react', 'typescript'] 
        }).code;

        const blob = new Blob([jsCode], { type: 'application/javascript' });
        const url = URL.createObjectURL(blob);

        const module = await import(url);
        const App = module.default;

        const root = createRoot(document.getElementById('root'));
        root.render(React.createElement(App));
      } catch (error) {
        console.error("Error al cargar la aplicación:", error);
        document.getElementById('root').innerHTML = `
          <div style="text-align: center; color: #f87171; padding: 2rem; font-family: sans-serif;">
            <h2>Error al iniciar Rhythm Studio</h2>
            <p>${error.message}</p>
          </div>
        `;
      }
    }

    initApp();
  </script>
</body>
</html>
